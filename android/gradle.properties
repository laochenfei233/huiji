# 解决网络连接和TLS问题
systemProp.http.socketTimeout=300000
systemProp.https.socketTimeout=300000
systemProp.http.connectionTimeout=300000
systemProp.https.connectionTimeout=300000

# 使用HTTP而不是HTTPS (如果需要)
systemProp.http.nonProxyHosts=localhost|127.*|10.*|172.16.*|172.17.*|172.18.*|172.19.*|172.20.*|172.21.*|172.22.*|172.23.*|172.24.*|172.25.*|172.26.*|172.27.*|172.28.*|172.29.*|172.30.*|172.31.*|192.168.*

# 禁用依赖检查（临时解决方案）
android.useAndroidX=true
android.enableJetifier=true

# 使用本地Gradle缓存
android.enableR8.fullMode=false

# Flutter优化
org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=512M
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# 解决TLS协议问题
org.gradle.daemon=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
