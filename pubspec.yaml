name: yanji
description: 言记 - 智能会议纪要系统
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.2.6
  path: ^1.8.3
  path_provider: ^2.0.15
  dio: ^5.0.3
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.1
  pdf: ^3.10.4
  share_plus: ^12.0.0
  web_socket_channel: ^3.0.3
  uuid: ^4.0.0
  audioplayers: 6.7.1
  permission_handler: ^12.0.3
  flutter_markdown: ^0.7.4+3
  
  # HTTP 客户端
  http: ^1.2.0

  # 本地 ASR 推理（Paraformer + VAD）
  sherpa_onnx: ^1.13.2

  # tar.bz2 模型解压
  archive: ^4.0.2

  # 加密（S3 签名）
  crypto: ^3.0.3

  # Web 平台 API（AudioContext 等）
  web: ^1.1.0
  record: ^6.2.0

  # 锁屏保持唤醒
  wakelock_plus: ^1.2.8

  # 录音常驻通知
  flutter_local_notifications: ^18.0.1

  # 本地 LLM 推理（llama.cpp for Flutter）
  fllama: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/database/